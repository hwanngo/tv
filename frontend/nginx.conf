server {
    listen 10034;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin reverse proxy to the Go bridge, so the SPA needs no backend URL
    # and the bridge/proxy is never exposed directly to the LAN. The trailing
    # slash on proxy_pass strips the /bridge prefix (/bridge/hls/x -> /hls/x).
    location /bridge/ {
        proxy_pass http://127.0.0.1:10033/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;            # stream HLS manifests/segments, don't buffer
        proxy_read_timeout 60s;
    }

    # SPA routes fall back to the shell (the client-side router owns them).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Content-hashed build assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location = /favicon.svg {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Entry document: never cache, and carry the security headers. SPA routes
    # internally fall back here, so these headers cover them too.
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    gzip on;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
